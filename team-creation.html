<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #311b92; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: background-color 0.3s; }
        header { width: 100%; background-color: #4a148c; display: flex; justify-content: center; padding: 15px 0; position: fixed; top: 0; }
        header img { max-height: 50px; }
        .container { max-width: 400px; width: 90%; text-align: center; margin-top: 60px; }
        h2 { color: white; margin-bottom: 20px; }
        #reader { width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; background: #000; position: relative; }
        #qr-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; pointer-events: none; }
        .corner { position: absolute; width: 25px; height: 25px; border: 4px solid #f44336; }
        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
        .top-right { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; }
        .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }
        .cam-btn { background: white; color: #333; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 20px; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <header><img src="logo.png" alt="Scout Logo"></header>

    <div class="container">
        <h2 id="title">Scan Team Creation QR Code</h2>
        <div id="reader">
            <div id="qr-frame">
                <div class="corner top-left"></div><div class="corner top-right"></div>
                <div class="corner bottom-left"></div><div class="corner bottom-right"></div>
            </div>
        </div>
        <button id="switch-btn" class="cam-btn" onclick="switchCamera()">Switch Camera</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if(params.get('type') === 'rejoin') document.getElementById('title').innerText = "Scan Team Rejoin QR Code";

        const scanner = new Html5Qrcode("reader");
        let currentFacing = "environment";

        function startCam(mode) {
            scanner.start({ facingMode: mode }, { fps: 10, qrbox: { width: 220, height: 220 } }, onScanSuccess)
            .then(() => document.getElementById('switch-btn').style.display = 'block')
            .catch(err => console.error(err));
        }

        function onScanSuccess(text) {
            if(navigator.vibrate) navigator.vibrate(100);
            const body = document.body;
            
            // Valid QR condition signature check match
            if (text === "SCOUT_CREATION_PASSPORT" || text.startsWith("STATION_")) {
                body.style.backgroundColor = "#4caf50"; // Flash Green
                setTimeout(() => {
                    scanner.stop().then(() => {
                        window.location.href = text.startsWith("STATION_") ? `player-dashboard.html?scan=${text}` : 'team-details.html';
                    });
                }, 600);
            } else {
                body.style.backgroundColor = "#f44336"; // Flash Red Error
                setTimeout(() => body.style.backgroundColor = "#311b92", 1000);
            }
        }

        function switchCamera() {
            currentFacing = currentFacing === "environment" ? "user" : "environment";
            scanner.stop().then(() => startCam(currentFacing));
        }

        startCam(currentFacing);
    </script>
</body>
</html>
