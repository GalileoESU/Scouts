<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Entry Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e0f2f1; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 360px; text-align: center; }
        h1 { color: #004d40; margin-bottom: 25px; font-size: 24px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .action-btn { background: #00796b; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .switch-link { margin-top: 15px; display: inline-block; font-size: 13px; color: #00796b; cursor: pointer; text-decoration: underline; }
        .feedback-msg { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 id="portal-title">Create New Team</h1>
        
        <div class="input-group">
            <label for="team-name">Team Username Name</label>
            <input type="text" id="team-name" placeholder="e.g. Fox Patrol">
        </div>

        <div class="input-group">
            <label for="team-pin">Access PIN</label>
            <input type="password" id="team-pin" placeholder="4-digit pin" maxlength="6">
        </div>

        <button class="action-btn" id="submit-btn" onclick="executePortalAction()">Register Team</button>
        
        <div>
            <span class="switch-link" id="toggle-intent-link" onclick="togglePortalIntent()">Switch to Rejoin Existing Team</span>
        </div>
        
        <div class="feedback-msg" id="status-feedback" style="display:none;"></div>
    </div>

    <script>
        const BACKEND_URL = 'https://scouts-backend-24lj.onrender.com';
        let actionIntent = 'CREATE'; // Can be 'CREATE' or 'REJOIN'

        function togglePortalIntent() {
            const title = document.getElementById('portal-title');
            const button = document.getElementById('submit-btn');
            const link = document.getElementById('toggle-intent-link');
            const feedback = document.getElementById('status-feedback');
            
            feedback.style.display = 'none';

            if (actionIntent === 'CREATE') {
                actionIntent = 'REJOIN';
                title.innerText = "Rejoin Your Team";
                button.innerText = "Login / Rejoin";
                link.innerText = "Switch to Create New Team";
            } else {
                actionIntent = 'CREATE';
                title.innerText = "Create New Team";
                button.innerText = "Register Team";
                link.innerText = "Switch to Rejoin Existing Team";
            }
        }

        function executePortalAction() {
            const nameVal = document.getElementById('team-name').value.trim();
            const pinVal = document.getElementById('team-pin').value.trim();
            const feedback = document.getElementById('status-feedback');

            if (!nameVal || !pinVal) {
                feedback.style.display = 'block';
                feedback.style.color = '#c62828';
                feedback.innerText = "Please fill out both inputs fields completely.";
                return;
            }

            feedback.style.display = 'block';
            feedback.style.color = '#004d40';
            feedback.innerText = "Authenticating with server engine...";

            const targetEndpoint = actionIntent === 'CREATE' ? '/api/team/create' : '/api/team/rejoin';

            fetch(`${BACKEND_URL}${targetEndpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ teamName: nameVal, pin: pinVal })
            })
            .then(async res => {
                const data = await res.json();
                if (res.ok && data.success) {
                    localStorage.setItem('scout_team_id', data.teamId);
                    feedback.style.color = '#2e7d32';
                    feedback.innerText = "Authorized! Launching application hub...";
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    throw new Error(data.message || "Invalid inputs or verification error.");
                }
            })
            .catch(err => {
                feedback.style.color = '#c62828';
                feedback.innerText = err.message;
            });
        }
    </script>
</body>
</html>
