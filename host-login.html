<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #311b92; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .container { max-width: 350px; width: 90%; background: #4a148c; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }
        h2 { color: white; margin-bottom: 20px; }
        .form-group { text-align: left; margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { color: #d1c4e9; font-size: 14px; font-weight: bold; }
        input { padding: 12px; border-radius: 8px; border: none; font-size: 16px; background: #f5f5f5; }
        .btn-login { background-color: #4caf50; color: white; padding: 12px; border-radius: 8px; font-size: 18px; border: none; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-back { background-color: #666; color: white; padding: 10px; border-radius: 8px; font-size: 14px; border: none; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
        .error-text { color: #ff8a80; font-size: 14px; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Host Admin Portal</h2>
        <form id="host-form" onsubmit="handleHostLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="host-username" required>
            </div>
            <div class="form-group">
                <label>4-Digit PIN</label>
                <input type="password" id="host-pin" maxlength="4" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
            <div id="login-error" class="error-text">Incorrect Credentials. Access Denied.</div>
            <button type="button" class="btn-back" onclick="location.href='index.html'">← Back to Team Portal</button>
        </form>
    </div>

    <script>
        function handleHostLogin(e) {
            e.preventDefault();
            const username = document.getElementById('host-username').value;
            const pin = document.getElementById('host-pin').value;
            const errorText = document.getElementById('login-error');

            const BACKEND_URL = 'https://scouts-backend-24lj.onrender.com';

            fetch(`${BACKEND_URL}/api/host/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, pin })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('hostToken', data.token);
                    window.location.href = 'host-dashboard.html';
                } else {
                    errorText.style.display = 'block';
                }
            })
            .catch(err => {
                console.error("Login failed:", err);
                alert("Could not connect to backend server.");
            });
        }
    </script>
</body>
</html>
